services:
  postgres:
    image: postgres:17-alpine
    container_name: otel_db
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: otel_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: otel_minio
    restart: no
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: otel_prometheus
    restart: no
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus:/etc/prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: otel_loki
    restart: no
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki:/etc/loki
      - /loki

  tempo:
    image: grafana/tempo:2.5.0
    container_name: otel_tempo
    restart: no
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4318:4318"
      - "43170:43170"
    volumes:
      - ./config/tempo:/etc/tempo
      - /var/tempo

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: otel_pyroscope
    restart: no
    ports:
      - "4040:4040"

  grafana:
    image: grafana/grafana:11.4.2
    container_name: otel_grafana
    restart: no
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
