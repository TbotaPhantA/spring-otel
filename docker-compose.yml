services:
  postgres:
    image: postgres:17-alpine
    container_name: otel_db
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: otel_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s