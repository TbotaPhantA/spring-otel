global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['host.docker.internal:9090']

  - job_name: 'otel'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 5s

  - job_name: 'pyroscope'
    static_configs:
      - targets: ['host.docker.internal:4040']

  - job_name: 'tempo'
    static_configs:
      - targets: ['host.docker.internal:3200']
